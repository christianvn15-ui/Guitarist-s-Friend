<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Guitarist's Friend</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3498db">
</head>
<body>
  <header>
    <h1>🎸 Guitarist's Friend</h1>
    <nav>
      <button id="navNotes">Saved Lyrics</button>
    </nav>
  </header>

  <main id="mainPage">
    <section class="editor">
      <h2>Write Lyrics</h2>
      <input type="text" id="noteTitle" placeholder="Note title">
      <button id="saveNote">Save Lyrics</button>
      <br>
      <textarea id="notesArea" placeholder="[Intro] 

	[Verse 1]
		... 

	[Chorus]
		... 

	[Verse 2]
		... "></textarea>
    </section>
  </main>

  <!-- Saved Notes Page -->
  <main id="savedPage" class="hidden">
    <h2>Saved Lyrics</h2>
    <section class="timer">
      <label for="minutesSaved">Timer (minutes):</label>
      <input type="number" id="minutesSaved" min="1" value="1">
      <button id="startButtonSaved">Start Wake Lock</button>
      <button id="releaseButtonSaved">Release Wake Lock</button>
      <div id="countdownSaved"></div>
      <div class="progress"><div id="progressBarSaved"></div></div>
    </section>
    <br>
    <button id="backButton">⬅ Back</button>
    <div id="notesList"></div>
    <button class="clearAll" id="clearAllNotes">Clear All Songs</button>
  </main>
    
  <!-- Song View Page -->
  <main id="songViewPage" class="hidden">
    <h2 id="songTitle"></h2>
    <section class="timer">
      <label for="minutesSong">Timer (minutes):</label>
      <input type="number" id="minutesSong" min="1" value="4">
      <button id="startButtonSong">Start</button>
      <button id="releaseButtonSong">Stop</button>
      <div id="countdownSong"></div>
      <div class="progress"><div id="progressBarSong"></div></div>
    </section>
    <div id="songLyrics" class="lyricsBox"></div>
    <button id="backToSaved">⬅ Back</button>
  </main>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>

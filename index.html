<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Guitarist's Friend</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3498db">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.1.0/css/all.css" integrity="sha512-ajhUYg8JAATDFejqbeN7KbF2zyPbbqz04dgOLyGcYEk/MJD3V+HJhJLKvJ2VVlqrr4PwHeGTTWxbI+8teA7snw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Firebase Modular SDK -->
  <script type="module" src="script.js"></script>

</head>
<body>
  <header>
    <a href="index.html" class="logo"> M </a>
    <h1>Musician</h1>
    <nav>
      <button id="navNotes"><i class="fas fa-folder-open" aria-hidden="true"></i> Saved</button>
      <button id="authButton" class="auth-btn"><i class="fas fa-user" aria-hidden="true"></i> Sign In</button>
    </nav>
  </header>

  <main id="mainPage">
    <section class="editor">
      <h2>Write Lyrics</h2>
      <input class="songTitle" type="text" id="noteTitle" placeholder="Song title">
      <button id="saveNote">Save <i class="fas fa-save"></i></button>
      <br>
      <textarea id="notesArea" placeholder="[Intro]
      
[Verse 1]
  ...
        
[Chorus]
  ...
      "></textarea>
    </section>
  </main>

  <!-- Saved Notes Page -->
  <main id="savedPage" class="hidden">
    <h2>Saved Lyrics</h2>
    <div id="authStatus" class="auth-status"></div>
    <section class="timer">
      <label for="minutesSaved">Timer (minutes):</label>
      <input type="number" id="minutesSaved" min="1" value="4">
      <button id="startButtonSaved">Start Wake Lock</button>
      <button id="releaseButtonSaved">Release Wake Lock</button>
      <div id="countdownSaved"></div>
      <div class="progress"><div id="progressBarSaved"></div></div>
    </section>
    <br>
    <button id="backButton"><i class="fas fa-angle-double-left"></i> Back</button>
    <div id="notesList"></div>
    <button class="clearAll" id="clearAllNotes">Clear All Notes</button>
    <button class="sync-btn" id="syncButton"><i class="fas fa-sync"></i> Sync to Cloud</button>
  </main>

  <!-- Song View Page -->
  <main id="songViewPage" class="hidden">
    <h2 id="songTitle"></h2>
    
    <section class="timer">
      <label for="minutesSong"><i class="fas fa-stopwatch"></i> (minutes):</label>
      <input type="number" id="minutesSong" min="1" value="4">
      <br>
      <button id="startButtonSong"><i class="fas fa-play"></i></button>
      <button id="releaseButtonSong"><i class="fas fa-pause"></i></button>
      <div id="countdownSong"></div>
      <div class="progress"><div id="progressBarSong"></div></div>
    </section>
    <button id="backToSaved"><i class="fas fa-angle-double-left"></i> Back</button>
    <div id="songLyrics" class="lyricsBox"></div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>

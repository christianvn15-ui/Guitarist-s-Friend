<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Musician</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3498db">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.1.0/css/all.css" integrity="sha512-ajhUYg8JAATDFejqbeN7KbF2zyPbbqz04dgOLyGcYEk/MJD3V+HJhJLKvJ2VVlqrr4PwHeGTTWxbI+8teA7snw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Firebase Modular SDK -->
  <script type="module" src="script.js"></script>

</head>
<body>
  <header>
    <img src="logo-big.png" alt="Musician" height="50px" width="50px">
    <nav>
      <button id="navLyrics">Library</button>
      <button id="navSetlists" class="setlist-btn">Setlists</button>
      <button id="authButton" class="auth-btn">Sign In</button>
    </nav>
  </header>

  <main id="mainPage">
    <section class="editor">
      <h2>Write Lyrics</h2>
      <input class="songTitle" type="text" id="lyricTitle" placeholder="Song title">
      <button id="saveLyric">Save <i class="fas fa-save"></i></button>
      <br>
      <textarea id="lyricsArea" placeholder="[Intro]
      
[Verse 1]
  ...
        
[Chorus]
  ...
      "></textarea>
    </section>
  </main>

  <!-- Saved Lyrics Page -->
  <main id="savedPage" class="hidden">
    <h2>Saved Lyrics</h2>
    <div id="authStatus" class="auth-status"></div>
    
    <!-- SEARCH BAR -->
    <div class="search-container">
      <input type="text" id="searchLyrics" placeholder="🔍 Search songs by title or lyrics..." class="search-input">
      <button id="clearSearch" class="clear-search hidden"><i class="fas fa-times"></i></button>
    </div>
    <div id="searchResults" class="search-results hidden"></div>
    <br>
    <button id="backButton"><i class="fas fa-angle-double-left"></i> Back</button>
    <div id="lyricsList"></div>
    <button class="clearAll" id="clearAllLyrics">Clear All Lyrics</button>
    <button class="sync-btn" id="syncButton"><i class="fas fa-sync"></i> Sync to Cloud</button>
  </main>

  <!-- Setlists Page -->
  <main id="setlistsPage" class="hidden">
    <h2>My Setlists</h2>
    <div id="setlistAuthStatus" class="auth-status"></div>
    
    <div class="setlist-controls">
      <input type="text" id="newSetlistName" placeholder="New setlist name..." class="setlist-input">
      <button id="createSetlist" class="setlist-create-btn"><i class="fas fa-plus"></i> Create</button>
    </div>
    
    <div id="setlistsList"></div>
    
    <button id="backFromSetlists"><i class="fa fa-home"></i> Home</button>
  </main>

  <!-- Setlist Detail Page - BUTTONS REMOVED FROM HERE -->
  <main id="setlistDetailPage" class="hidden">
    <h2 id="currentSetlistName"></h2>
    
    <button id="addSongsToSetlist" class="add-songs-btn"><i class="fas fa-plus"></i> Add Songs</button>
    
    <div id="setlistSongsList"></div>
    
    <div id="addSongsPanel" class="hidden add-songs-panel">
      <h3>Add Songs to Setlist</h3>
      <div id="availableSongsList"></div>
      <button id="closeAddSongs" class="close-panel-btn">Done</button>
    </div>
    
    <button id="backToSetlists"><i class="fas fa-angle-double-left"></i> Back to Setlists</button>
  </main>

  <!-- Song View Page -->
  <main id="songViewPage" class="hidden">
    <h2 id="songTitle"></h2>

    <section class="timer">
      <label for="minutesSong"><i class="fas fa-stopwatch"></i> (minutes):</label>
      <input type="number" id="minutesSong" min="1" value="4">
      <br>
      <button id="startButtonSong"><i class="fas fa-play"></i></button>
      <button id="releaseButtonSong"><i class="fas fa-pause"></i></button>
      <div id="countdownSong"></div>
      <div class="progress"><div id="progressBarSong"></div></div>
    </section>
    <button id="backToSaved"><i class="fas fa-angle-double-left"></i> Back</button>
    <div id="songLyrics" class="lyricsBox"></div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>
